<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DIV Tag</title>
  <style>
    /* div is a block-level container — takes full width by default */
    .box {
      background-color: lightblue;
      padding: 10px;
      margin: 10px 0;
    }

    /* divs are commonly used for layout with flexbox/grid */
    .flex-container {
      display: flex;
      gap: 10px;
    }

    .flex-item {
      background-color: coral;
      padding: 10px;
      flex: 1;
    }
  </style>
</head>
<body>

  <!-- Basic div: just a generic block container, no semantic meaning -->
  <div class="box">I am a simple div</div>

  <!-- Nested divs: divs inside divs for grouping content -->
  <div class="box">
    Parent div
    <div style="background: lightyellow; padding: 5px; margin-top: 5px;">Child div</div>
  </div>

  <!-- Div used for layout (flexbox) -->
  <div class="flex-container">
    <div class="flex-item">Column 1</div>
    <div class="flex-item">Column 2</div>
    <div class="flex-item">Column 3</div>
  </div>

</body>
</html>
