<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inline Elements</title>
</head>
<body>

  <!-- All inline elements only take as much width as their content -->
  <!-- They do NOT start on a new line -->

  <!-- <span>     — generic inline container, no semantic meaning -->
  <!-- <a>        — anchor/hyperlink -->
  <!-- <strong>   — bold text, semantic importance -->
  <!-- <b>        — bold text, no semantic meaning -->
  <!-- <em>       — italic text, semantic emphasis -->
  <!-- <i>        — italic text, no semantic meaning -->
  <!-- <u>        — underlined text -->
  <!-- <s>        — strikethrough text -->
  <!-- <mark>     — highlighted/marked text -->
  <!-- <small>    — smaller text (fine print) -->
  <!-- <sup>      — superscript text (e.g. x²) -->
  <!-- <sub>      — subscript text (e.g. H₂O) -->
  <!-- <abbr>     — abbreviation with tooltip (e.g. HTML) -->
  <!-- <cite>     — title of a work (book, film, etc.) -->
  <!-- <code>     — inline code snippet -->
  <!-- <kbd>      — keyboard input (e.g. press Ctrl+C) -->
  <!-- <samp>     — sample output from a program -->
  <!-- <var>      — variable in math/programming context -->
  <!-- <q>        — short inline quotation -->
  <!-- <time>     — machine-readable date/time -->
  <!-- <label>    — label for a form input -->
  <!-- <input>    — form input field -->
  <!-- <button>   — clickable button -->
  <!-- <select>   — dropdown menu -->
  <!-- <textarea> — multi-line text input -->
  <!-- <img>      — image (inline but can be resized) -->
  <!-- <br>       — line break -->
  <!-- <script>   — inline JS (does not render visually) -->

</body>
</html>
