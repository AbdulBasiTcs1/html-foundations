<!DOCTYPE html>
<html>

<head>
    <title>Course Table</title>
    <style>
        body {
            font-family: Arial;
        }

        table {
            width: 60%;
            margin: auto;
            border-collapse: collapse;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
            padding: 10px;
        }

        td {
            padding: 10px;
        }

        table,
        th,
        td {
            border: 1px solid black;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>

    <h2 style="text-align:center;">Course Details</h2>

    <table>
        <tr>
            <th>Course Name</th>
            <th>Duration</th>
            <th>Instructor</th>
            <th>Fee</th>
        </tr>
        <tr>
            <td>HTML Basics</td>
            <td>2 Weeks</td>
            <td>Mr. Adeel</td>
            <td>3000 PKR</td>
        </tr>
        <tr>
            <td>CSS Design</td>
            <td>3 Weeks</td>
            <td>Ms. Hina</td>
            <td>4000 PKR</td>
        </tr>
        <tr>
            <td>JavaScript</td>
            <td>4 Weeks</td>
            <td>Mr. Bilal</td>
            <td>5000 PKR</td>
        </tr>
        <tr>
            <td>React JS</td>
            <td>5 Weeks</td>
            <td>Ms. Sana</td>
            <td>6000 PKR</td>
        </tr>
    </table>

</body>

</html>
