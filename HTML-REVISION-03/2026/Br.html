<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR Tag Example</title>
</head>
<body>
    <h1>Using the BR Tag</h1>
    
    <p>
        This is the first line.<br>
        This is the second line.<br>
        This is the third line.
    </p>
    
    <h2>Address Example</h2>
    <p>
        John Doe<br>
        123 Main Street<br>
        New York, NY 10001<br>
        USA
    </p>
    
    <h2>Poem Example</h2>
    <p>
        Roses are red,<br>
        Violets are blue,<br>
        HTML is fun,<br>
        And so are you!
    </p>
</body>
</html>
