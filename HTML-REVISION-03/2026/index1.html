<!DOCTYPE html>
<html>

<head>
    <title>Student Registration Form</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .container {
            width: 400px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            margin: 5px 0 10px 0;
        }

        .btn {
            width: 48%;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Registration Form</h2>

        <form>
            Full Name:
            <input type="text" required>

            Email Address:
            <input type="email" required>

            Password:
            <input type="password" required>

            Confirm Password:
            <input type="password" required>

            Gender:
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female

            <br><br>

            Date of Birth:
            <input type="date">

            Country:
            <select>
                <option>Pakistan</option>
                <option>USA</option>
                <option>UK</option>
            </select>

            Course Selection:<br>
            <input type="checkbox"> HTML
            <input type="checkbox"> CSS
            <input type="checkbox"> JavaScript
            <input type="checkbox"> React

            <br><br>

            Upload Profile Picture:
            <input type="file">

            <br>

            <input type="submit" value="Submit" class="btn">
            <input type="reset" value="Reset" class="btn">
        </form>
    </div>

</body>

</html>
