<!--    
    This is the tables where we can add some of the tables in our Html
    Like:
    
    table - opening tags

    caption - to name the table like what the table is about 

    thead - to wrap the heading section of the table like the table headings

    tbody - to wrap the body section of the table like the table body containing the tr-td etc.

    colspan in html - like to merge two columns in the table
    rowspan in html - like to merge two rows in the table

    th --- For table headings
    tr --- For table rows
    td --- For table data celss

    table - closing tags
-->
