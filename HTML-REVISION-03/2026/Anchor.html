<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Tags in HTML</title>
</head>
<body>
    <h1>HTML Anchor Tags</h1>

    <!-- Basic external link -->
    <a href="https://www.example.com">Visit Example</a>
    <br>

    <!-- Link with target attribute -->
    <a href="https://www.example.com" target="_blank">Open in New Tab</a>
    <br>

    <!-- Internal link to another page -->
    <a href="pages/about.html">About Us</a><br>

    <!-- Link to a specific section on the same page -->
     <br>
    <a href="#section1">Jump to Section 1</a>

    <!-- Email link -->
    <a href="mailto:user@example.com">Send Email</a>
    <br>

    <!-- Phone link -->
    <a href="tel:+1234567890">Call Us</a>
    <br>

    <!-- Link with title attribute -->
    <a href="https://www.example.com" title="Visit our website">Example Site</a> <br>

    <!-- Link with class and id -->
     <br>
    <a href="https://www.example.com" class="btn" id="primary-link">Primary Link</a>

    <!-- Target section with id -->
    <h2 id="section1">Section 1</h2>
    <p>This is section 1 content.</p>

    <!-- Download link -->
    <a href="files/document.pdf" download>Download PDF</a>

</body>
</html>
