<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seminar Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<table>
    <!-- Top Header -->
    <tr>
        <th rowspan="3">Day</th>
        <th colspan="3">Seminar</th>
    </tr>
    <tr>
        <th colspan="2">Schedule</th>
        <th rowspan="2">Topic</th>
    </tr>
    <tr>
        <th>Begin</th>
        <th>End</th>
    </tr>

    <!-- Monday -->
    <tr>
        <td rowspan="2">Monday</td>
        <td class="yellow">8:00 a.m.</td>
        <td class="blue">5:00 p.m.</td>
        <td>Introduction to XML</td>
    </tr>
    <tr>
        <td colspan="2" class="beige">Validity: DTD and Relax NG</td>
    </tr>

    <!-- Tuesday -->
    <tr>
        <td rowspan="3">Tuesday</td>
        <td class="yellow">8:00 a.m.</td>
        <td class="yellow">11:00 a.m.</td>
        <td rowspan="2">XPath</td>
    </tr>
    <tr>
        <td class="yellow">11:00 a.m.</td>
        <td class="green">2:00 p.m.</td>
    </tr>
    <tr>
        <td class="green">2:00 p.m.</td>
        <td class="blue">5:00 p.m.</td>
        <td>XSL Transformations</td>
    </tr>

    <!-- Wednesday -->
    <tr>
        <td>Wednesday</td>
        <td class="yellow">8:00 a.m.</td>
        <td class="green">12:00 p.m.</td>
        <td>XSL Formatting Objects</td>
    </tr>

</table>

</body>
</html>
