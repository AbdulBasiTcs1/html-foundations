<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscript and Superscript</title>
</head>
<body>
    <h1>Subscript and Superscript Examples</h1>

    <h2>Subscript (<sub>)</sub></h2>
    <p>Water is H<sub>2</sub>O</p>
    <p>The chemical formula for sulfuric acid is H<sub>2</sub>SO<sub>4</sub></p>
    <p>Footnote<sub>1</sub></p>

    <h2>Superscript (<sup>)</sup></h2>
    <p>2<sup>3</sup> = 8</p>
    <p>Einstein's equation: E = mc<sup>2</sup></p>
    <p>Copyright <sup>&copy;</sup> 2026</p>

    <h2>Mixed Example</h2>
    <p>The area of a circle is πr<sup>2</sup></p>
    <p>Log<sub>10</sub>(100) = 2</p>

</body>
</html>
