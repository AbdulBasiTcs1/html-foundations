<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html Tags</title>
</head>
<body>
    <h1>HTML TAGS</h1>
    <p>This is a paragraph with the opening and the closing tags!</p>
    
    <h2>Common HTML Tags</h2>
    <ul>
        <li><strong>Heading Tags:</strong> h1, h2, h3, h4, h5, h6</li>
        <li><strong>Text Tags:</strong> p, span, strong, em, u</li>
        <li><strong>List Tags:</strong> ul, ol, li</li>
        <li><strong>Link & Image:</strong> a, img</li>
    </ul>
    
    <hr>
    
    <p>Visit <a href="https://www.w3schools.com">W3Schools</a> for more info.</p>
    <img src="sample.jpg" alt="Sample Image">
    
    <!-- Tags acts like the containers in html-->
</body>
</html>
