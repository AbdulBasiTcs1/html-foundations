<!DOCTYPE html>
<html>
<head>
    <title>Webpage Layout</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
        }
        header {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }
        nav {
            background: #555;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }
        .main {
            display: flex;
            padding: 20px;
        }
        .left {
            width: 50%;
        }
        .right {
            width: 50%;
            text-align: center;
        }
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }
        img {
            max-width: 80%;
        }
    </style>
</head>

<body>

<header>
    <h1>My Website</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Courses</a>
    <a href="#">Contact</a>
</nav>

<div class="main">
    <div class="left">
        <h2>Introduction</h2>
        <p>This is a simple webpage layout created using HTML and CSS. It includes a header, navigation bar, main content area, and footer.</p>
    </div>

    <div class="right">
        <img src="https://via.placeholder.com/300" alt="Sample Image">
    </div>
</div>

<footer>
    <p>Designed by Abdul Basit (SP24-BCS-033)</p>
</footer>

</body>
</html>
